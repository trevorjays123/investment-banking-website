    <style>
        /* Loading Spinner */
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(10, 25, 47, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        
        .loading-spinner {
            text-align: center;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(59, 130, 246, 0.2);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        
        .loading-message {
            color: #9ca3af;
            font-size: 0.875rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Button Loading State */
        .btn-loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .btn-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        
        /* Animations */
        .animate-slide-in {
            animation: slideIn 0.3s ease-out;
        }
        
        .animate-slide-out {
            animation: slideOut 0.3s ease-out forwards;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }
        
        /* Modal Animations */
        .modal-overlay {
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        
        .modal-overlay.modal-visible {
            opacity: 1;
        }
        
        .modal-content {
            transform: scale(0.95);
            transition: transform 0.2s ease;
        }
        
        .modal-visible .modal-content {
            transform: scale(1);
        }
        
        /* Card Hover Effects */
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }
        
        /* Pulse Animation for Live Updates */
        .pulse-live {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        
        /* Sidebar */
        .sidebar {
            transition: transform 0.3s ease;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                z-index: 40;
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #112240;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #4b5563;
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>

    <script>
        // Global variables
        let userAccounts = [];
        
        // Check authentication on page load
        (function() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/';
                return;
            }
            
            // Load user info
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            const userName = (user.first_name || '') + ' ' + (user.last_name || '');
            document.getElementById('userName').textContent = userName.trim() || 'User';
            document.getElementById('userEmail').textContent = user.email || '';
            document.getElementById('userInitials').textContent = (user.first_name?.[0] || 'U') + (user.last_name?.[0] || '');
            
            // Initialize API Service
            if (typeof ApiService !== 'undefined') {
                ApiService.init();
            }
            
            // Render initial dashboard content
            renderDashboardSection('dashboard');
            
            // Setup user menu dropdown
            const userMenuBtn = document.getElementById('userMenuBtn');
            const userDropdown = document.getElementById('userDropdown');
            
            userMenuBtn.addEventListener('click', () => {
                userDropdown.classList.toggle('hidden');
            });
            
            // Close dropdown when clicking outside
            document.addEventListener('click', (e) => {
                if (!userMenuBtn.contains(e.target) && !userDropdown.contains(e.target)) {
                    userDropdown.classList.add('hidden');
                }
            });
            
            // Online/offline handling
            window.addEventListener('online', () => {
                document.getElementById('offline-indicator').classList.add('hidden');
                showToast('You\'re back online!', 'success');
            });
            
            window.addEventListener('offline', () => {
                document.getElementById('offline-indicator').classList.remove('hidden');
            });
        })();

                            </button>

                                <i class="fas fa-history"></i>
                                <span>History</span>
                            </button>
                        </div>

                        <!-- Total Balance -->
                        <div class="bg-gradient-to-r from-blue-600 to-blue-800 rounded-lg shadow-lg p-6 mb-8 text-white">
                            <p class="text-blue-100 mb-1">Total Balance</p>
                            <p class="text-4xl font-bold" id="total-balance">$0.00</p>
                        </div>

                        <!-- Accounts Summary -->
                        <h2 class="text-2xl font-bold mb-4 text-white">Your Accounts</h2>
                        <div id="accounts-summary" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                            <div class="bg-dark-700 rounded-lg p-6 text-center">
                                <p class="text-gray-400">Loading accounts...</p>
                            </div>
                        </div>

                        <!-- Recent Transactions -->
                        <h2 class="text-2xl font-bold mb-4 text-white">Recent Transactions</h2>
                        <div class="bg-dark-700 rounded-lg shadow p-6">
                            <div id="recent-transactions">

                `;

                window.location.href = '/settings.html';
            } else if (section === 'cards') {
                mainContent.innerHTML = `
                    <div class="fade-in">
                        <h2 class="text-2xl font-bold mb-6 text-white">Your Cards</h2>
                        <div class="bg-dark-700 rounded-lg p-6 text-center">
                            <i class="fas fa-credit-card text-4xl text-gray-500 mb-4"></i>
                            <p class="text-gray-400">No cards available. Contact support to request a debit card.</p>
                        </div>
                    </div>
                `;
            }
        }
        
        // Global function: Load dashboard data
        async function loadDashboardData() {
            try {
                // Load accounts
                const accountsData = await API.get('/accounts');
                userAccounts = accountsData.accounts || [];
                
                // Store accounts in localStorage for later use
                localStorage.setItem('accounts', JSON.stringify(userAccounts));
                
                // Update total balance
                const totalBalance = userAccounts.reduce((sum, acc) => sum + parseFloat(acc.balance || 0), 0);
                document.getElementById('total-balance').textContent = new Intl.NumberFormat('en-US', {
                    style: 'currency',
                    currency: 'USD'
                }).format(totalBalance);
                
                // Render accounts
                const accountsContainer = document.getElementById('accounts-summary');
                if (userAccounts.length > 0) {
                    accountsContainer.innerHTML = userAccounts.map(acc => `
                        <div class="bg-dark-700 rounded-lg shadow p-4 card-hover transition-all duration-300">
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <span class="text-xs text-gray-400 uppercase">${acc.account_type}</span>
                                    <p class="font-mono text-sm text-gray-300">****${(acc.account_number || '').slice(-4)}</p>
                                </div>
                                <i class="fas ${acc.account_type === 'checking' ? 'fa-wallet' : 'fa-piggy-bank'} text-2xl text-accent-gold"></i>
                            </div>
                            <p class="text-2xl font-bold text-white">
                                ${new Intl.NumberFormat('en-US', {style: 'currency', currency: 'USD'}).format(parseFloat(acc.balance || 0))}
                            </p>
                            <span class="inline-block mt-2 px-2 py-1 text-xs rounded-full bg-green-900 text-green-300">${acc.status || 'active'}</span>
                        </div>
                    `).join('');
                } else {
                    accountsContainer.innerHTML = '<p class="text-gray-400 col-span-3">No accounts found. Please contact support.</p>';
                }
                
                // Load recent transactions
                if (userAccounts.length > 0) {
                    const txnData = await API.get(`/accounts/${userAccounts[0].id}/transactions?limit=5`);
                    const txnContainer = document.getElementById('recent-transactions');
                    
                    if (txnData.transactions && txnData.transactions.length > 0) {
                        txnContainer.innerHTML = txnData.transactions.map(txn => `
                            <div class="flex items-center justify-between py-3 border-b border-gray-700 last:border-0">
                                <div class="flex items-center space-x-3">
                                    <div class="w-10 h-10 rounded-full bg-dark-600 flex items-center justify-center">
                                        <i class="fas ${txn.transaction_type === 'deposit' ? 'fa-arrow-down text-green-400' : 'fa-arrow-up text-red-400'}"></i>
                                    </div>
                                    <div>
                                        <p class="font-medium text-white">${txn.description || txn.transaction_type}</p>
                                        <p class="text-xs text-gray-400">${new Date(txn.created_at).toLocaleDateString()}</p>
                                    </div>
                                </div>
                                <p class="font-semibold ${txn.transaction_type === 'deposit' ? 'text-green-400' : 'text-red-400'}">
                                    ${txn.transaction_type === 'deposit' ? '+' : '-'}${new Intl.NumberFormat('en-US', {style: 'currency', currency: 'USD'}).format(parseFloat(txn.amount))}
                                </p>
                            </div>
                        `).join('');
                    } else {
                        txnContainer.innerHTML = '<p class="text-gray-400">No recent transactions</p>';
                    }
                }
            } catch (error) {
                console.error('Error loading dashboard:', error);
                showToast('Failed to load dashboard data: ' + error.message, 'error');
            }
        }
        
        // Global function: Load accounts section
        async function loadAccountsSection() {
            try {
                const data = await API.get('/accounts');
                userAccounts = data.accounts || [];
                const container = document.getElementById('accounts-list');
                
                if (userAccounts.length > 0) {
                    container.innerHTML = userAccounts.map(acc => `
                        <div class="bg-dark-700 rounded-lg shadow p-6">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <span class="text-xs text-gray-400 uppercase">${acc.account_type}</span>
                                    <p class="font-mono text-lg text-white">${acc.account_number}</p>
                                </div>
                                <span class="px-2 py-1 text-xs rounded-full bg-green-900 text-green-300">${acc.status || 'active'}</span>
                            </div>
                            <p class="text-3xl font-bold text-white mb-4">
                                ${new Intl.NumberFormat('en-US', {style: 'currency', currency: 'USD'}).format(parseFloat(acc.balance || 0))}
                            </p>
                            <p class="text-sm text-gray-400">Currency: ${acc.currency || 'USD'}</p>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p class="text-gray-400">No accounts found</p>';
                }
            } catch (error) {
                console.error('Error loading accounts:', error);
                showToast('Failed to load accounts', 'error');
            }
        }
        
        // Global function: Load transactions section
        async function loadTransactionsSection() {
            try {
                const startDate = document.getElementById('txn-start-date')?.value || '';
                const endDate = document.getElementById('txn-end-date')?.value || '';
                
                let url = '/transactions?limit=20';
                if (startDate) url += `&start_date=${startDate}`;
                if (endDate) url += `&end_date=${endDate}`;
                
                const data = await API.get(url);
                const container = document.getElementById('transactions-list');
                
                if (data.transactions && data.transactions.length > 0) {
                    container.innerHTML = data.transactions.map(txn => `
                        <div class="p-4 flex items-center justify-between hover:bg-dark-600">
                            <div class="flex items-center space-x-4">
                                <div class="w-10 h-10 rounded-full bg-dark-600 flex items-center justify-center">
                                    <i class="fas ${txn.transaction_type === 'deposit' ? 'fa-arrow-down text-green-400' : 'fa-arrow-up text-red-400'}"></i>
                                </div>
                                <div>
                                    <p class="font-medium text-white">${txn.description || txn.transaction_type}</p>
                                    <p class="text-sm text-gray-400">${new Date(txn.created_at).toLocaleDateString()}</p>
                                </div>
                            </div>
                            <p class="font-bold ${txn.transaction_type === 'deposit' ? 'text-green-400' : 'text-red-400'}">
                                ${txn.transaction_type === 'deposit' ? '+' : '-'}${new Intl.NumberFormat('en-US', {style: 'currency', currency: 'USD'}).format(parseFloat(txn.amount))}
                            </p>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p class="p-6 text-gray-400">No transactions found</p>';
                }
            } catch (error) {
                console.error('Error loading transactions:', error);
                showToast('Failed to load transactions', 'error');
            }
        }
        
        // Global function: Load bills section
        async function loadBillsSection() {
            try {
                const [payeesData, paymentsData] = await Promise.all([
                    API.get('/bills/payees').catch(() => ({payees: []})),
                    API.get('/bills/payments').catch(() => ({payments: []}))
                ]);

                document.getElementById('payees-list').innerHTML = payeesData.payees?.length > 0 
                    ? payeesData.payees.map(p => `
                        <div class="flex justify-between items-center p-3 bg-dark-600 rounded">
                            <div>
                                <p class="font-medium text-white">${p.payee_name}</p>
                                <p class="text-sm text-gray-400">${p.bank_name}</p>
                            </div>
                            <button onclick="showPayBillModal(${p.id}, '${p.payee_name}')" class="text-blue-400 hover:underline">Pay</button>
                        </div>
                    `).join('')
                    : '<p class="text-gray-400">No payees added</p>';

                document.getElementById('payments-list').innerHTML = paymentsData.payments?.length > 0
                    ? paymentsData.payments.map(p => `
                        <div class="flex justify-between items-center p-3 bg-dark-600 rounded">
                            <div>
                                <p class="font-medium text-white">${p.payee_name}</p>
                                <p class="text-sm text-gray-400">Due: ${new Date(p.payment_date).toLocaleDateString()}</p>
                            </div>
                            <span class="px-2 py-1 text-xs rounded ${p.status === 'paid' ? 'bg-green-900 text-green-300' : 'bg-yellow-900 text-yellow-300'}">${p.status}</span>
                        </div>
                    `).join('')
                    : '<p class="text-gray-400">No scheduled payments</p>';
            } catch (error) {
                console.error('Error loading bills:', error);
            }
        }
        
        // Global function: Show transfer modal
        function showTransferModal() {
            const modal = document.getElementById('modal-container');
            modal.innerHTML = `
                <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                    <div class="bg-dark-700 rounded-lg p-6 w-full max-w-md mx-4">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-xl font-bold text-white">Money Transfer</h3>

                            </button>
                        </div>
                        <form id="transfer-form">

                            <div class="mb-4">

            `;
            
            document.getElementById('transfer-form').addEventListener('submit', async (e) => {

                        to_account_id: parseInt(document.getElementById('to-account').value),
                        amount: parseFloat(document.getElementById('amount').value),
                        description: document.getElementById('description').value
                    });
                    closeModal();
                    showToast('Transfer successful!', 'success');
                    loadDashboardData();
                } catch (error) {
                    showToast(error.message || 'Transfer failed', 'error');

            });

        // Global function: Show deposit modal
        function showDepositModal() {
            const modal = document.getElementById('modal-container');
            modal.innerHTML = `
                <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                    <div class="bg-dark-700 rounded-lg p-6 w-full max-w-md mx-4">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-xl font-bold text-white">Deposit Money</h3>
                            <button onclick="closeModal()" class="text-gray-400 hover:text-white">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                        <form id="deposit-form">
                            <div class="mb-4">
                                <label class="block text-gray-300 text-sm font-bold mb-2">Amount</label>
                                <input type="number" id="deposit-amount" class="w-full px-3 py-2 bg-dark-600 border border-gray-600 rounded-lg text-white focus:outline-none focus:border-blue-500" required min="0.01" step="0.01">
                            </div>
                            <div class="mb-4">
                                <label class="block text-gray-300 text-sm font-bold mb-2">Description (Optional)</label>
                                <input type="text" id="deposit-description" class="w-full px-3 py-2 bg-dark-600 border border-gray-600 rounded-lg text-white focus:outline-none focus:border-blue-500" placeholder="What's this for?">

                            <div class="flex gap-3">
                                <button type="submit" class="flex-1 bg-green-600 text-white py-2 rounded-lg hover:bg-green-700">Deposit</button>

                            </div>
                        </form>
                    </div>
                </div>
            `;
            
            document.getElementById('deposit-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                try {
                    await API.post('/transactions/deposit', {
                        account_id: userAccounts[0]?.id,
                        amount: parseFloat(document.getElementById('deposit-amount').value),
                        description: document.getElementById('deposit-description').value
                    });
                    closeModal();
                    showToast('Deposit successful!', 'success');
                    loadDashboardData();
                } catch (error) {
                    showToast(error.message || 'Deposit failed', 'error');
                }

        // Global function: Close modal
        function closeModal() {
            const modal = document.getElementById('modal-container');
            if (modal) modal.innerHTML = '';
        }
        
        // Global function: Show section (navigation)
        function showSection(section) {
            // Update nav links
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('text-white', 'bg-blue-600', 'bg-opacity-20', 'border-l-2', 'border-blue-500');
                link.classList.add('text-gray-400');
                link.removeAttribute('aria-current');
            });
            
            const activeLink = document.querySelector(`.nav-link[data-section="${section}"]`);
            if (activeLink) {
                activeLink.classList.remove('text-gray-400');
                activeLink.classList.add('text-white', 'bg-blue-600', 'bg-opacity-20', 'border-l-2', 'border-blue-500');
                activeLink.setAttribute('aria-current', 'page');
            }
            
            // Update page title
            const titles = {
                dashboard: { title: 'Dashboard', subtitle: 'Welcome back to your dashboard' },
                accounts: { title: 'Accounts', subtitle: 'Manage your bank accounts' },
                transactions: { title: 'Transactions', subtitle: 'View your transaction history' },
                transfer: { title: 'Transfer', subtitle: 'Send money to other accounts' },
                bills: { title: 'Bill Pay', subtitle: 'Manage your bill payments' },
                cards: { title: 'Cards', subtitle: 'Manage your debit and credit cards' },
                settings: { title: 'Settings', subtitle: 'Manage your profile and preferences' }
            };
            
            const pageInfo = titles[section] || titles.dashboard;
            document.getElementById('page-title').textContent = pageInfo.title;
            document.getElementById('page-subtitle').textContent = pageInfo.subtitle;
            
            // Render section
            renderDashboardSection(section);
            
            // Close mobile sidebar
            document.getElementById('sidebar').classList.remove('open');
        }
        
        // Global function: Toggle sidebar
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }
        
        // Global function: Logout
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            localStorage.removeItem('accounts');
            window.location.href = '/';
        }
        
        // Global function: Show toast
        function showToast(message, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const colors = {
                success: 'bg-green-600',
                error: 'bg-red-600',
                info: 'bg-blue-600'
            };

            toast.className = `${colors[type] || 'bg-blue-600'} text-white px-6 py-3 rounded-lg shadow-lg mb-2 fade-in`;
            toast.textContent = message;

            container.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
        
        // Global function: Show pay bill modal
        function showPayBillModal(payeeId, payeeName) {
            const modal = document.getElementById('modal-container');
            modal.innerHTML = `
                <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                    <div class="bg-dark-700 rounded-lg p-6 w-full max-w-md mx-4">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-xl font-bold text-white">Pay ${payeeName}</h3>
                            <button onclick="closeModal()" class="text-gray-400 hover:text-white">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                        <form id="pay-bill-form">
                            <div class="mb-4">
                                <label class="block text-gray-300 text-sm font-bold mb-2">Amount</label>
                                <input type="number" id="bill-amount" class="w-full px-3 py-2 bg-dark-600 border border-gray-600 rounded-lg text-white focus:outline-none focus:border-blue-500" required min="0.01" step="0.01">
                            </div>
                            <div class="mb-4">
                                <label class="block text-gray-300 text-sm font-bold mb-2">Payment Date</label>
                                <input type="date" id="bill-date" class="w-full px-3 py-2 bg-dark-600 border border-gray-600 rounded-lg text-white focus:outline-none focus:border-blue-500" required>
                            </div>
                            <div class="flex gap-3">
                                <button type="submit" class="flex-1 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">Schedule Payment</button>
                                <button type="button" onclick="closeModal()" class="flex-1 bg-gray-600 text-white py-2 rounded-lg hover:bg-gray-500">Cancel</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
            
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('bill-date').min = today;

            document.getElementById('pay-bill-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                try {
                    await API.post('/bills/payments', {
                        payee_id: payeeId,
                        from_account_id: userAccounts[0]?.id,
                        amount: parseFloat(document.getElementById('bill-amount').value),
                        payment_date: document.getElementById('bill-date').value
                    });
                    closeModal();
                    showToast('Payment scheduled successfully', 'success');
                    loadBillsSection();
                } catch (error) {
                    showToast(error.message || 'Failed to schedule payment', 'error');
                }
            });
        }

    </script>
